name: 🦊 Tuyul — Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Flutter APK Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Kodni yuklash
        uses: actions/checkout@v4

      - name: ☕ Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Flutter o'rnatish
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: 📦 Paketlarni yuklash
        working-directory: tuyul
        run: flutter pub get

      - name: 🏗️ APK build
        working-directory: tuyul
        run: flutter build apk --release --no-shrink

      - name: 📤 APK yuklash
        uses: actions/upload-artifact@v4
        with:
          name: Tuyul-APK
          path: tuyul/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
